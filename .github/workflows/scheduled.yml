# Example workflow: Scheduled monitoring
name: Production Health Monitor

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:  # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check production health
        uses: ./  # Use local action for testing
        with:
          url: 'https://winwebpulse.com'
          api-key: ${{ secrets.WEBPULSE_API_KEY }}
          fail-on-score: 70
